version: "3.9"

services:

  # ===============================
  # AUTH SERVICE (FASTAPI)
  # ===============================
  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "8000:8000"
    env_file:
      - .env.development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./keys:/app/keys:ro   # 🔥 JWT keys
    restart: always

  # ===============================
  # POSTGRESQL
  # ===============================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: myauthapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # ===============================
  # REDIS
  # ===============================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  # ===============================
  # PROMETHEUS
  # ===============================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  # ===============================
  # GRAFANA
  # ===============================
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always


# ===============================
# VOLUMES
# ===============================
volumes:
  postgres_data: