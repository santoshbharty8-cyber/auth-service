// -----------------------------
// Base64URL → ArrayBuffer
// -----------------------------
function base64urlToBuffer(base64url){

const base64 = base64url.replace(/-/g,"+").replace(/_/g,"/")

const binary = atob(base64)

const bytes = new Uint8Array(binary.length)

for(let i=0;i<binary.length;i++){
bytes[i] = binary.charCodeAt(i)
}

return bytes.buffer
}


// -----------------------------
// ArrayBuffer → Base64URL
// -----------------------------
function bufferToBase64url(buffer){

const base64 = btoa(String.fromCharCode(...new Uint8Array(buffer)))

return base64
.replace(/\+/g,"-")
.replace(/\//g,"_")
.replace(/=/g,"")
}


// -----------------------------
// REGISTER PASSKEY
// -----------------------------
async function register(){

try{

window.focus()

if(!document.hasFocus()){
alert("Click on the page first")
return
}

console.log("Register started")

const token = localStorage.getItem("access_token")

const res = await fetch("/webauthn/register/start",{
method:"GET",
headers:{
"Authorization":"Bearer "+token
}
})

const options = await res.json()

console.log("Register options:",options)

options.publicKey.challenge =
base64urlToBuffer(options.publicKey.challenge)

options.publicKey.user.id =
base64urlToBuffer(options.publicKey.user.id)

// small delay prevents focus race condition
await new Promise(r=>setTimeout(r,100))

const credential = await navigator.credentials.create({
publicKey:options.publicKey
})

console.log("Credential created:",credential)

const payload = {

id:credential.id,
rawId:bufferToBase64url(credential.rawId),
type:credential.type,

response:{
clientDataJSON:bufferToBase64url(
credential.response.clientDataJSON
),
attestationObject:bufferToBase64url(
credential.response.attestationObject
)
}

}

const finish = await fetch("/webauthn/register/finish",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify(payload)

})

const result = await finish.json()

console.log("Register result:",result)

alert("Passkey registered successfully")

}catch(err){

console.error("Register error:",err)

alert("Registration failed")

}

}


// -----------------------------
// LOGIN
// -----------------------------
async function login(){

try{

const email =
document.getElementById("email").value

const res = await fetch("/webauthn/login/start",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email})

})

const options = await res.json()

console.log("Login options:",options)

options.publicKey.challenge =
base64urlToBuffer(options.publicKey.challenge)

if(options.publicKey.allowCredentials){

options.publicKey.allowCredentials.forEach(c=>{
c.id = base64urlToBuffer(c.id)
})

}

const assertion =
await navigator.credentials.get({
publicKey:options.publicKey
})

console.log("Assertion:",assertion)

const payload = {

id:assertion.id,
rawId:bufferToBase64url(assertion.rawId),

response:{
clientDataJSON:bufferToBase64url(
assertion.response.clientDataJSON
),
authenticatorData:bufferToBase64url(
assertion.response.authenticatorData
),
signature:bufferToBase64url(
assertion.response.signature
)
}

}

const result = await fetch("/webauthn/login/finish",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

}).then(r=>r.json())

console.log("Login result:",result)

alert("Login successful")

}catch(err){

console.error("Login error:",err)

alert("Login failed")

}

}


// -----------------------------
// Button Events
// -----------------------------
document
.getElementById("registerBtn")
.addEventListener("click",register)

document
.getElementById("loginBtn")
.addEventListener("click",login)

</script>
