apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi   # 🔥 increased for safety

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: POSTGRES_PASSWORD

          # ✅ HEALTH CHECKS (VERY IMPORTANT)
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5

          # ✅ RESOURCES
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ STORAGE (correct PG path)
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          # ✅ SECURITY (non-root best effort)
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: postgres

spec:
  type: ClusterIP   # 🔥 internal only

  selector:
    app: postgres

  ports:
    - port: 5432
      targetPort: 5432