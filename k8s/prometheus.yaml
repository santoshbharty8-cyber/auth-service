apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:

      # 🔥 Auth Service
      - job_name: "auth-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["auth-service:8000"]

      # 🔥 Prometheus itself
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 9090

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"

          # ✅ HEALTH CHECKS
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5

          # ✅ RESOURCES
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            # ✅ Config (correct mounting)
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml

            # ✅ Data persistence
            - name: prometheus-storage
              mountPath: /prometheus

      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config

        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc

      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus

spec:
  type: NodePort   # 🔥 change to ClusterIP if using Ingress

  selector:
    app: prometheus

  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30002