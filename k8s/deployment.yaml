apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
        - name: auth
          image: santosh138/auth-service:latest

          ports:
            - containerPort: 8000

          envFrom:
            - secretRef:
                name: auth-secret

          # ✅ HEALTH CHECKS (correct place)
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

          # ✅ RESOURCES (correct place)
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ VOLUME MOUNT (correct)
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/keys
              readOnly: true

      # ✅ VOLUMES (ONLY secret here)
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-secret