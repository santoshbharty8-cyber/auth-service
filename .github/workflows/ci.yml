name: CI Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true
          pip install pytest-cov flake8


      - name: Lint (optional but)
        run: |
          pip install flake8
          flake8 app || true
      
      - name: Debug Redis
        run: |
          sudo apt-get update -y
          sudo apt-get install -y redis-tools --fix-missing
          redis-cli -h localhost ping || echo "Redis not responding"
      
      - name: Set JWT Keys
        run: |
          mkdir -p keys

          printf "%s" "${{ secrets.JWT_PRIVATE_KEY }}" > keys/private.pem
          printf "%s" "${{ secrets.JWT_PUBLIC_KEY }}" > keys/public.pem

          chmod 600 keys/private.pem
          chmod 600 keys/public.pem

      - name: Verify Keys
        run: |
          echo "Checking keys directory..."
          ls -l keys
          echo "First line of private key:"
          head -n 1 keys/private.pem

      - name: Run Tests
        env:
          ENV: testing
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          OTEL_EXPORTER_ENDPOINT: http://localhost:4317
        run: pytest --cov=app --cov-report=term-missing